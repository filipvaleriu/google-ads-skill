# ============================================================
# TEMPLATE - Configurare Google Ads API
# ============================================================
# UTILIZARE:
#   1. Copiaza acest fisier ca: config/google_ads.ini
#   2. Completeaza valorile reale (client_id, secret, tokens, etc.)
#   3. config/google_ads.ini e in .gitignore - NU face commit cu valori reale
#
# OBTINERE REFRESH TOKEN:
#   Ruleaza: python Analiza-Campanii/get_google_refresh_token.py
#   Scriptul deschide flow-ul OAuth si scrie refresh_token aici automat.
#
# API VERSION:
#   Google Ads scoate versiune noua la ~3 luni si retrage versiuni la ~18 luni.
#   Mereu porneste de la ultima versiune; daca da 404, urca pana merge.
# ============================================================

[google_ads]
# Developer token - din Google Ads UI > Tools > API Center (necesita cont Manager - MCC)
developer_token = YOUR_DEVELOPER_TOKEN

# OAuth 2.0 Desktop credentials - din Google Cloud Console > APIs & Services > Credentials
client_id = YOUR_CLIENT_ID.apps.googleusercontent.com
client_secret = YOUR_CLIENT_SECRET

# Refresh token - obtinut prin get_google_refresh_token.py (scope: adwords)
refresh_token = YOUR_REFRESH_TOKEN

# Customer ID - contul Google Ads de care atragem datele (fara cratime)
customer_id = 0000000000

# Login customer ID (optional) - ID-ul contului Manager daca accesezi un sub-cont
# Lasa gol daca nu folosesti cont Manager.
login_customer_id =

# Versiunea API - verifica https://developers.google.com/google-ads/api/docs/release-notes
api_version = v21
